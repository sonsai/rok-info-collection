name: Show Rok DKP Data

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run Python with env
        run: python -m src.main C13045
        env:
          KVK_INFOS: ${{ vars.KVK_INFOS }}
          ROK_B_TOKEN: ${{ secrets.ROK_B_TOKEN}}
          ROK_P_TOKEN: ${{ secrets.ROK_P_TOKEN}}
          DKP_T4_DEAD: ${{ vars.DKP_T4_DEAD}}
          DKP_T5_DEAD: ${{ vars.DKP_T5_DEAD}}
          MODE: "dkp_data"

      - name: Commit result file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/dkp_data_result.txt

          # 如果没有变化，避免报错
          git diff --cached --quiet || git commit -m "Update dkp_data_result.txt"

          git push