<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Error {{ code }} | 错误 {{ code }}</title>

    <style>
        body { 
            font-family: Arial; 
            background-color: #000;
            color: #fff;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #f0f0f0;
        }

        p {
            font-size: 18px;
            color: #ccc;
            margin-top: 10px;
        }

        .error-box {
            background: #111;
            border: 1px solid #444;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 30px;
            width: 60%;
        }

        a.button-link {
            padding: 10px 20px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }

        a.button-link:hover {
            background: #3a3a3a;
            border-color: #555;
        }
    </style>
</head>

<body>

    <div class="error-box">
        <h1>{{ code }}</h1>

        <!-- 中英双语标题 -->
        <h2>
            {{ message_cn }}<br>
            <span style="font-size:20px; color:#bbb;">{{ message_en }}</span>
        </h2>

        <!-- 中英双语说明 -->
        <p>请求无法完成，请稍后再试。</p>
        <p style="font-size:16px;">The request could not be completed. Please try again later.</p>

        <a class="button-link" href="/">返回首页 Back to Home</a>
    </div>

</body>
</html>
